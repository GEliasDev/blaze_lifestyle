server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses browser history routing — any path that isn't a real
    # file (e.g. /coach/clients/123/nutrition) must fall back to index.html
    # so the client-side router can resolve it. Without this, a direct load,
    # refresh, or browser-restored deep link 404s at the nginx level.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html references hashed /assets/ filenames that change on every
    # build — without this, browsers cache it heuristically and can keep
    # serving a stale index.html pointing at JS/CSS files a newer deploy
    # already deleted (404s), especially after several redeploys in quick
    # succession (e.g. a preview environment).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # sw.js isn't content-hashed, so without this the browser can apply
    # heuristic caching (based on Last-Modified age) and keep serving its
    # cached copy of the service worker script — silently skipping the
    # network check that UpdateBanner.jsx relies on (registration.update(),
    # polled every 10min) until the browser's ~24h forced revalidation
    # finally kicks in. This is what actually made deploys invisible until
    # someone manually cleared site data; no-cache forces every check to hit
    # the network so a new deploy is detected within minutes.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
