server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses browser history routing — any path that isn't a real
    # file (e.g. /coach/clients/123/nutrition) must fall back to index.html
    # so the client-side router can resolve it. Without this, a direct load,
    # refresh, or browser-restored deep link 404s at the nginx level.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
